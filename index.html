<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos-20</title>
  <link rel="icon" href="Design sem nome (3).png" type="image/png">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }

    .fade-in {
      animation: fadeIn .4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-gradient-to-br from-gray-50 to-gray-100">

<!-- HEADER -->
<header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
  <div class="max-w-6xl mx-auto flex items-center justify-between p-4">
    <h1 class="text-2xl font-bold text-green-600 tracking-tight">Pedidos-20</h1>
    <input id="search" placeholder="Buscar..." class="border px-4 py-2 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-green-500 transition" />
  </div>
</header>

<!-- HERO -->
<section class="max-w-6xl mx-auto p-6">
  <div class="bg-gradient-to-r from-green-600 via-green-500 to-green-400 text-white p-8 rounded-3xl shadow-xl">
    <h2 class="text-3xl font-bold">Peça online com facilidade 🚀</h2>
    <p class="mt-2 text-sm opacity-90">Experiência rápida, moderna e sem taxas</p>
  </div>
</section>

<!-- PRODUTOS -->
<main id="produtos" class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></main>

<!-- BOTÃO FIXO -->
<div class="fixed top-4 right-4 z-50">
  <button onclick="abrirCarrinho()" 
    class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-full shadow-xl transition">

    <span>🛒</span>
    <span id="qtd" class="bg-white text-green-600 px-2 py-0.5 rounded-full text-xs font-bold">0</span>
    
  </button>
</div>
<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center">
  <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl fade-in">
    <h2 class="text-xl font-bold mb-4">Seu Pedido</h2>
    <ul id="lista" class="space-y-4 text-sm"></ul>

    <div class="mt-4 border-t pt-4 flex justify-between font-bold text-lg">
      <span>Total</span>
      <span>R$ <span id="total">0</span></span>
    </div>

    <button onclick="enviarWhatsApp()" class="mt-5 w-full bg-green-600 hover:bg-green-700 text-white p-3 rounded-xl font-semibold transition">
      Finalizar Pedido
    </button>

    <button onclick="fecharCarrinho()" class="mt-2 w-full bg-gray-200 p-2 rounded-xl">
      Fechar
    </button>
  </div>
</div>

<script>
const produtos = [
  {
    id:1,
    nome:'X-Burguer',
    preco:15,
    img:'download (3).jpg',
    descricao:'Pão, carne, queijo e molho especial',
    categoria:'Hambúrguer',
    avaliacao:4.8
  },
  {
    id:2,
    nome:'Coca-Cola',
    preco:5,
    img:'download (2).jpg',
    descricao:'Refrigerante gelado, lata 350ml',
    categoria:'Bebida',
    avaliacao:4.7
  },
  {
    id:3,
    nome:'Batata Frita',
    preco:10,
    img:'download (4).jpg',
    descricao:'Batata crocante e sequinha com sal',
    categoria:'Acompanhamento',
    avaliacao:4.6
  },
  {
    id:4,
    nome:'Pizza',
    preco:33,
    img:'download (6).jpg',
    descricao:'Pizza sabor tradicional com queijo e molho especial',
    categoria:'Pizza',
    avaliacao:4.9
  },
  {
    id:5,
    nome:'Combo Batata Frita+Coca-cola',
    preco:25,
    img:'download (5).jpg',
    descricao:'Combo com batata frita + Coca-Cola gelada',
    categoria:'Combo',
    avaliacao:4.8
  },
  {
    id:6,
    nome:'Suco',
    preco:2,
    img:'download (7).jpg',
    descricao:'Suco natural refrescante',
    categoria:'Bebida',
    avaliacao:4.5
  }
];

let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

function salvar(){ localStorage.setItem('carrinho', JSON.stringify(carrinho)); }

function renderProdutos(){
  const div = document.getElementById('produtos');
  const busca = document.getElementById('search').value.toLowerCase();
  div.innerHTML = '';

  produtos
    .filter(p=>p.nome.toLowerCase().includes(busca))
    .forEach(p=>{
      div.innerHTML += `
        <div class="bg-white rounded-3xl shadow-md hover:shadow-xl transition overflow-hidden fade-in">
          <img src="${p.img}" class="w-full h-40 object-cover" />
          <div class="p-4">
           <h3 class="font-semibold text-lg">${p.nome}</h3>

<p class="text-gray-400 text-sm">${p.descricao}</p>

<p class="text-xs text-gray-500">
  📂 ${p.categoria} • ⭐ ${p.avaliacao}
</p>

<p class="text-gray-600 font-semibold mt-2 mb-3">
  R$ ${p.preco}
</p>
            <button onclick="add(${p.id})" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 rounded-xl transition">
              Adicionar ao carrinho
            </button>
          </div>
        </div>
      `;
    });
}

function add(id){
  const item = carrinho.find(p=>p.id===id);
  if(item){ item.qtd++; }
  else {
    const prod = produtos.find(p=>p.id===id);
    carrinho.push({...prod, qtd:1});
  }
  atualizarQtd();
  salvar();
}

function remover(id){
  carrinho = carrinho.filter(p=>p.id!==id);
  atualizarCarrinho();
  atualizarQtd();
  salvar();
}

function atualizarQtd(){
  const total = carrinho.reduce((acc,p)=>acc+p.qtd,0);
  document.getElementById('qtd').innerText = total;
}

function abrirCarrinho(){
  document.getElementById('modal').classList.remove('hidden');
  atualizarCarrinho();
}

function fecharCarrinho(){
  document.getElementById('modal').classList.add('hidden');
}

function atualizarCarrinho(){
  const lista = document.getElementById('lista');
  lista.innerHTML = '';
  let total = 0;

  carrinho.forEach(p=>{
    total += p.preco * p.qtd;
    lista.innerHTML += `
      <li class="flex justify-between items-center">
        <div>
          <p class="font-medium">${p.nome} x${p.qtd}</p>
          <small class="text-gray-500">R$ ${p.preco}</small>
        </div>
        <button onclick="remover(${p.id})" class="text-red-500 text-sm">Remover</button>
      </li>
    `;
  });

  document.getElementById('total').innerText = total;
}
function gerarCodigoPedido(){
  let contador = localStorage.getItem('pedido_contador');

  if(!contador){
    contador = 1;
  } else {
    contador = parseInt(contador) + 1;
  }

  localStorage.setItem('pedido_contador', contador);

  const ano = new Date().getFullYear();

  return `${ano}${String(contador).padStart(3,'0')}`;
}
function enviarWhatsApp(){
  let total = 0;
  const codigo = gerarCodigoPedido();

  let msg = '';

  msg += `🛒 *NOVO PEDIDO*%0A`;
  msg += `━━━━━━━━━━━━━━━━━━%0A`;
  msg += `📦 Pedido: *${codigo}*%0A`;
  msg += `📅 ${new Date().toLocaleDateString('pt-BR')}%0A`;
  msg += `⏰ ${new Date().toLocaleTimeString('pt-BR')}%0A`;
  msg += `📌 Status: *Aguardando confirmação*%0A`;
  msg += `━━━━━━━━━━━━━━━━━━%0A%0A`;

  msg += `📋 *RESUMO DO PEDIDO*%0A%0A`;

  carrinho.forEach((p)=>{
    const subtotal = p.preco * p.qtd;

    msg += `🔸 *${p.nome}*%0A`;
    msg += `   🧮 Qtd: ${p.qtd} | 💵 R$${p.preco}%0A`;
    msg += `   📊 Subtotal: *R$${subtotal}*%0A%0A`;

    total += subtotal;
  });

  msg += `━━━━━━━━━━━━━━━━━━%0A`;
  msg += `💰 *TOTAL GERAL: R$${total}*%0A`;
  msg += `━━━━━━━━━━━━━━━━━━%0A`;

  const numero = '5591980208294';

  window.open(`https://wa.me/${numero}?text=${msg}`, '_blank');
}
// eventos

document.getElementById('search').addEventListener('input', renderProdutos);

renderProdutos();
atualizarQtd();
</script>

</body>
</html>
